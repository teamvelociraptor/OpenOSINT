<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Sfondo bianco aggiunto per visibilità in Dark Mode -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Left glyph: magnifier rendered as pure geometry, no curves -->
  <!-- Outer square lens frame -->
  <rect x="8" y="8" width="44" height="44" fill="none" stroke="#000000" stroke-width="5"/>
  <!-- Inner cross reticle -->
  <line x1="30" y1="14" x2="30" y2="46" stroke="#000000" stroke-width="2"/>
  <line x1="14" y1="30" x2="46" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- Handle: thick diagonal line -->
  <line x1="50" y1="50" x2="64" y2="64" stroke="#000000" stroke-width="6" stroke-linecap="square"/>

  <!-- Vertical rule separating glyph from wordmark -->
  <rect x="76" y="4" width="3" height="72" fill="#000000"/>

  <!-- Wordmark: OPEN on line 1, OSINT on line 2, monospaced stencil feel -->
  <text
    x="92"
    y="38"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="bold"
    letter-spacing="2"
    fill="#000000">OPEN</text>
  <text
    x="92"
    y="66"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="bold"
    letter-spacing="2"
    fill="#000000">OSINT</text>

  <!-- Version stamp bottom-right -->
  <text
    x="312"
    y="76"
    font-family="'Courier New', Courier, monospace"
    font-size="9"
    fill="#000000"
    text-anchor="end">v2.0.0</text>
</svg>

