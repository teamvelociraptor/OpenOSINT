<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="OpenOSINT icon">
  <!-- Magnifying glass lens ring -->
  <circle cx="25" cy="25" r="19" stroke="#00ff88" stroke-width="3.5"/>
  <!-- Handle -->
  <line x1="39" y1="39" x2="57" y2="57" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <!-- Terminal ">" prompt inside lens -->
  <polyline points="11,19 18,25 11,31" stroke="#00ff88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor "_" block -->
  <rect x="22" y="29" width="12" height="3.5" rx="1.5" fill="#00ff88"/>
</svg>
