<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1a12"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#00ff88" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)"/>

  <!-- Glow halo behind icon -->
  <circle cx="250" cy="240" r="180" fill="url(#logoGlow)"/>

  <!-- Outer ring (decorative, very faint) -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="rgba(0,255,136,0.06)" stroke-width="1"/>
  <circle cx="250" cy="250" r="170" fill="none" stroke="rgba(0,255,136,0.04)" stroke-width="1"/>

  <!-- Icon: original 64×64, scale 5.0 (320px), centered at 250,245 -->
  <!-- translate = 250 - 32*5, 245 - 32*5 = 250-160, 245-160 = 90, 85 -->
  <g transform="translate(90,85) scale(5.0)" fill="none" filter="url(#glow)">
    <!-- Lens soft fill -->
    <circle cx="25" cy="25" r="19" fill="rgba(0,255,136,0.07)"/>
    <!-- Lens ring -->
    <circle cx="25" cy="25" r="19" stroke="#00ff88" stroke-width="3"/>
    <!-- Handle -->
    <line x1="39" y1="39" x2="57" y2="57" stroke="#00ff88" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Terminal › prompt -->
    <polyline points="11,19 18,25 11,31" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cursor block -->
    <rect x="22" y="29" width="12" height="3.5" rx="1.5" fill="#00ff88"/>
  </g>

  <!-- Bottom dot — subtle indicator pixel (optional, keeps it minimal) -->
  <circle cx="250" cy="436" r="3" fill="#00ff88" opacity="0.35"/>
</svg>
